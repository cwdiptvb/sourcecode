name: Deploy to Surge

on:
  push:
    branches:
      - main  # Change to master if your default branch uses that name

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Surge
        run: npm install -g surge

      - name: Deploy to Surge
        # The "." tells Surge to deploy your root directory directly
        run: surge . your-custom-domain.surge.sh --token ${{ secrets.SURGE_TOKEN }} --login ${{ secrets.SURGE_LOGIN }}

