name: Deploy to Surge
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Project Dependencies
        run: npm install
      - name: Build Project
        run: npm run build 
      - name: Install Surge
        run: npm install -g surge
      - name: Deploy to Surge
        run: surge . iptvpro.ddns.net --token ${{ secrets.SURGE_TOKEN }} --login ${{ secrets.SURGE_LOGIN }}
